				"  COPYFILE_DISABLE=1 /usr/bin/tar \\",
				"    --no-xattrs --numeric-owner --no-mac-metadata \\",
				"    -cjf \"$TAR_NAME\" \\",
				"    -C \"$(dirname \"$TMP_XCF\")\" \"$(basename \"$TMP_XCF\")\"",
