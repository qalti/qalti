				"      find \"$nested\" -type f \\( -name \"CodeResources\" -o -name \"embedded.mobileprovision\" -o -name \"archived-expanded-entitlements.xcent\" \\) -exec rm -f {} \\; 2>/dev/null || true",
				"      nbase=$(basename \"${nested%*.framework}\")",
				"      nbin=\"${nested}/${nbase}\"",
				"      if [ -f \"$nbin\" ] && /usr/bin/file -b \"$nbin\" | grep -q \"Mach-O\"; then",
				"        /usr/bin/codesign --remove-signature \"$nbin\" 2>/dev/null || true",
