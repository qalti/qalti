				"# 13) Cleanup temporary XCFramework directory",
				"rm -rf \"$(dirname \"$TMP_XCF\")\"",
				"echo \"✅ Packed unsigned ${TAR_NAME} → ${DEST_DIR}\"",
				"",
				"",
			);
