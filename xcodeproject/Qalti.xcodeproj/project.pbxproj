				"mkdir -p \"$(dirname \"$TMP_XCF\")\"",
				": # TMP_XCF defined",
				"",
				"if [ -d \"$IOS_DSYM\" ] && [ -d \"$SIM_DSYM\" ]; then",
				"  env -u TOOLCHAINS xcrun xcodebuild -create-xcframework \\",
				"    -framework \"$IOS_FW\" -debug-symbols \"$IOS_DSYM\" \\",
				"    -framework \"$SIM_FW\" -debug-symbols \"$SIM_DSYM\" \\",
				"    -output \"$TMP_XCF\"",
				"else",
				"  env -u TOOLCHAINS xcrun xcodebuild -create-xcframework \\",
				"    -framework \"$IOS_FW\" \\",
