				"  SIM_TS=\"$(mtime \"$SIM_FW\")\"",
				"  if [ \"$OUT_TS\" -ge \"$IOS_TS\" ] && [ \"$OUT_TS\" -ge \"$SIM_TS\" ]; then",
				"    echo \"ℹ️  ${TAR_NAME} is up to date; skipping re-pack.\"",
				"    echo \"✅ Exists at ${OUT_TAR}\"",
				"    exit 0",
				"  fi",
				"fi",
				"",
				"# 9) Unsign frameworks before XCFramework creation",
				"echo \"🔧 Removing code signatures from built frameworks…\"",
				"unsign_framework \"$IOS_FW\"",
