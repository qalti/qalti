				"IOS_FW=\"$DERIVED/ios_devices.xcarchive/Products/Library/Frameworks/${QALTI_LIB_FRAMEWORK_NAME}.framework\"",
				"SIM_FW=\"$DERIVED/ios_sim.xcarchive/Products/Library/Frameworks/${QALTI_LIB_FRAMEWORK_NAME}.framework\"",
				"IOS_DSYM=\"$DERIVED/ios_devices.xcarchive/dSYMs/${QALTI_LIB_FRAMEWORK_NAME}.framework.dSYM\"",
				"SIM_DSYM=\"$DERIVED/ios_sim.xcarchive/dSYMs/${QALTI_LIB_FRAMEWORK_NAME}.framework.dSYM\"",
				"",
				"if [ ! -d \"$IOS_FW\" ] || [ ! -d \"$SIM_FW\" ]; then",
				"  echo \"error: Framework outputs missing:\"",
