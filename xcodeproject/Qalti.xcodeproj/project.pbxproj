				"  xcrun xcodebuild archive \\",
				"  \"$container_kind\" \"$container_path\" \\",
				"  -scheme \"$QALTI_LIB_SCHEME\" \\",
				"  -configuration \"$QALTI_LIB_CONFIG\" \\",
				"  $COMMON_KV \\",
				"  -destination \"generic/platform=iOS\" \\",
				"  -archivePath \"$DERIVED/ios_devices\" \\",
				"  -derivedDataPath \"$DERIVED\"",
				"",
				"# 7) Archive iOS Simulator (arm64 + x86_64)",
				"run_xc env $UNSET_FLAGS TOOLCHAINS=com.apple.dt.toolchain.XcodeDefault \\",
				"  xcrun xcodebuild archive \\",
				"  \"$container_kind\" \"$container_path\" \\",
				"  -scheme \"$QALTI_LIB_SCHEME\" \\",
				"  -configuration \"$QALTI_LIB_CONFIG\" \\",
