				"/bin/mv -f \"$(dirname \"$TMP_XCF\")/$TAR_NAME\" \"$OUT_TAR\"",
				"",
				"# 12) Prove it's there",
				"echo \"Contents of ${DEST_DIR}:\"",
				"ls -lah \"${DEST_DIR}\"",
