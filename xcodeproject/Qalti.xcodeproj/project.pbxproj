				"    /usr/bin/codesign --remove-signature \"$bin\" 2>/dev/null || true",
				"  fi",
				"",
				"  # Nested frameworks (if any)",
				"  find \"$fw\" -type d -name \"*.framework\" ! -path \"$fw\" -exec sh -c '",
