				"",
				"# 10) Create XCFramework (attach dSYMs if both present)",
				"TMP_XCF=\"${QALTI_NESTED_BUILD_CACHE_DIR}/xcframework/${QALTI_LIB_FRAMEWORK_NAME}.xcframework\"",
				"# Ensure clean temp dir so failed previous runs don't interfere",
