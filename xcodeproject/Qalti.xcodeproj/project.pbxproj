				"  find \"$root\" -type d -name \"_CodeSignature\" -prune -exec rm -rf {} \\; 2>/dev/null || true",
				"  find \"$root\" -type f \\( -name \"CodeResources\" -o -name \"embedded.mobileprovision\" -o -name \"archived-expanded-entitlements.xcent\" \\) -exec rm -f {} \\; 2>/dev/null || true",
				"",
				"  # Unsign Mach-O binaries (framework executables, dylibs, bundles)",
				"  find \"$root\" -type f \\( -perm -111 -o -name \"*.dylib\" -o -name \"*.so\" -o -name \"*.bundle\" -o -name \"${QALTI_LIB_FRAMEWORK_NAME}\" \\) -exec sh -c '",
				"    for p do",
				"      if /usr/bin/file -b \"$p\" | grep -q \"Mach-O\"; then",
				"        /usr/bin/codesign --remove-signature \"$p\" 2>/dev/null || true",
				"      fi",
				"    done",
				"  ' sh {} \\;",
				"}",
				"",
				"unsign_framework() {",
				"  fw=\"$1\"",
				"  [ -d \"$fw\" ] || return 0",
				"",
				"  # Main binary (FrameworkName.framework/FrameworkName)",
				"  bin=\"${fw}/${QALTI_LIB_FRAMEWORK_NAME}\"",
				"  if [ ! -f \"$bin\" ]; then",
				"    # Fallback: first executable-looking file at framework root",
				"    bin=\"$(find \"$fw\" -maxdepth 1 -type f -perm -111 | head -n 1 || true)\"",
				"  fi",
				"",
				"  unsign_tree \"$fw\"",
				"",
