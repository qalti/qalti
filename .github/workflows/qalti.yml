name: Qalti E2E Tests

on:
  push:
    branches: ["run-ci-example/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      REAL_DEVICE_UDID: ${{ secrets.REAL_DEVICE_UDID }}
      ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
      ALLURE_ENDPOINT: ${{ vars.ALLURE_ENDPOINT }}
      ALLURE_PROJECT_ID: ${{ vars.ALLURE_PROJECT_ID }}
      APP_SIMULATOR_ZIP_URL: ${{ vars.APP_SIMULATOR_ZIP_URL }}
      APP_REAL_DEVICE_ZIP_URL: ${{ vars.APP_REAL_DEVICE_ZIP_URL }}
      SIMULATOR_DEVICE_NAME: ${{ vars.SIMULATOR_DEVICE_NAME }}
      SIMULATOR_OS: ${{ vars.SIMULATOR_OS }}
      QALTI_MODEL: ${{ vars.QALTI_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up runner
        run: bash scripts/setup_runner.sh

      - name: Run Qalti tests (simulator)
        run: |
          /Applications/Qalti.app/Contents/Resources/QaltiScheduler \
            --tests "./tests" \
            --device-name "${SIMULATOR_DEVICE_NAME:-iPhone 16}" \
            --os "${SIMULATOR_OS:-18.3}" \
            --workers 4 \
            --model "${QALTI_MODEL:-gpt-4.1}" \
            --token "$OPENROUTER_API_KEY" \
            --app-path "${SIMULATOR_APP_ZIP:-SyncUps-simulator.zip}" \
            --allure-dir "./reports/allure"

      - name: Run Qalti test on real device (optional)
        if: ${{ env.REAL_DEVICE_UDID != '' }}
        run: |
          /Applications/Qalti.app/Contents/MacOS/Qalti cli ./tests/syncups_save_and_end_meeting.test \
            --app-path "${REAL_DEVICE_APP_ZIP:-SyncUps-real-device.zip}" \
            --type real \
            --udid "$REAL_DEVICE_UDID"

      - name: Upload Allure results (optional)
        if: ${{ env.ALLURE_TOKEN != '' && env.ALLURE_ENDPOINT != '' && env.ALLURE_PROJECT_ID != '' }}
        run: |
          ./allurectl upload \
            --endpoint "$ALLURE_ENDPOINT" \
            --token "$ALLURE_TOKEN" \
            --project-id "$ALLURE_PROJECT_ID" \
            "./reports/allure"
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qalti-reports-${{ github.run_id }}
          path: ./reports/
